name: Build Deepin Package in Chroot (with custom deb)

on:
  workflow_dispatch:
  push:
    tags:
      - 'build-*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install debootstrap and tools
        run: |
          apt-get update
          apt-get install -y debootstrap sudo wget

      # 如果有自定义 crimson 脚本，复制（可选）
      - name: Copy crimson script if exists
        run: |
          if [ -f ./crimson ]; then
            cp ./crimson /usr/share/debootstrap/scripts/crimson
          fi

      - name: Bootstrap Deepin rootfs
        run: |
          debootstrap --arch amd64 \
            --include=deepin-keyring,sudo,vim \
            crimson ./deepin-rootfs http://mirrors.kernel.org/deepin/beige

      - name: Mount /proc /sys /dev
        run: |
          mount --bind /dev ./deepin-rootfs/dev
          mount -t proc none ./deepin-rootfs/proc
          mount -t sysfs none ./deepin-rootfs/sys
          mount -t devpts none ./deepin-rootfs/dev/pts

      - name: Install build deps inside chroot
        run: |
          chroot ./deepin-rootfs /bin/bash -c "
            apt-get update
            apt-get install -y devscripts build-essential fakeroot
            if [ -f /workspace/debian/control ]; then
              mk-build-deps -i -r -t 'apt-get --yes' /workspace/debian/control
            fi
          "

      # ========== 新增：安装项目根目录的 .deb 包 ==========
      - name: Install custom .deb package from project root
        run: |
          # 查找项目根目录下的 .deb 文件
          DEB_FILE=$(ls *.deb 2>/dev/null | head -1)
          if [ -n "$DEB_FILE" ]; then
            echo "安装包: $DEB_FILE"
            cp "$DEB_FILE" ./deepin-rootfs/root/
            chroot ./deepin-rootfs /bin/bash -c "
              dpkg -i /root/$DEB_FILE
              apt install -f -y
            "
          else
            echo "没有找到 .deb 包，跳过"
          fi
      # ===================================================

      - name: Bind mount source code
        run: |
          mkdir -p ./deepin-rootfs/workspace
          mount --bind $PWD ./deepin-rootfs/workspace

      - name: Build package with all cores
        run: |
          CORES=$(nproc)
          echo "使用 ${CORES} 核心编译"
          chroot ./deepin-rootfs /bin/bash -c "
            cd /workspace
            export DEB_BUILD_OPTIONS='parallel=${CORES}'
            dpkg-buildpackage -us -uc -b -j${CORES}
          "

      - name: Cleanup mounts
        if: always()
        run: |
          umount ./deepin-rootfs/workspace 2>/dev/null || true
          umount ./deepin-rootfs/dev/pts 2>/dev/null || true
          umount ./deepin-rootfs/sys 2>/dev/null || true
          umount ./deepin-rootfs/proc 2>/dev/null || true
          umount ./deepin-rootfs/dev 2>/dev/null || true

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find ./deepin-rootfs -maxdepth 1 -name "*.deb" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepin-debs
          path: artifacts/*.deb
